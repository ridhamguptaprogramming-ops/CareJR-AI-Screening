<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previous Reports</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="previous-page">
  <header class="page-header">
    <h1>Previous Medical Reports</h1>
    <div class="button-group">
      <a href="dashboard.html" class="link-button btn-secondary">Back to Dashboard</a>
      <button type="button" class="btn-primary" onclick="exportAllReports()">Export All</button>
      <button type="button" class="delete-btn" onclick="clearReports()">Clear All</button>
    </div>
  </header>

  <section class="mini-stats" aria-label="Report summary">
    <article class="mini-stat">
      <h3>Visible</h3>
      <p id="summaryVisible">0</p>
    </article>
    <article class="mini-stat">
      <h3>Stored</h3>
      <p id="summaryStored">0</p>
    </article>
    <article class="mini-stat">
      <h3>Critical</h3>
      <p id="summaryCritical">0</p>
    </article>
    <article class="mini-stat">
      <h3>Average Risk</h3>
      <p id="summaryAverage">0%</p>
    </article>
  </section>

  <section class="controls-row" aria-label="Report filters">
    <input
      id="searchReport"
      type="search"
      placeholder="Search by patient, symptom, doctor"
      aria-label="Search reports"
      oninput="filterReports()"
    >

    <select id="sortReports" aria-label="Sort reports" onchange="filterReports()">
      <option value="newest">Sort: Newest</option>
      <option value="oldest">Sort: Oldest</option>
      <option value="risk-high">Sort: Highest Risk</option>
      <option value="risk-low">Sort: Lowest Risk</option>
    </select>

    <label class="inline-check" for="highRiskOnly">
      <input id="highRiskOnly" type="checkbox" onchange="filterReports()">
      High risk only (>= 70%)
    </label>
  </section>

  <p id="reportsMessage" class="inline-message" aria-live="polite"></p>
  <div id="reportContainer"></div>

  <script src="script.js"></script>
</body>
</html>
