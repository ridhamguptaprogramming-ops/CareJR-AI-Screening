<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <div class="box">
    <h2>CareJR AI - Secure Login</h2>
    <form onsubmit="return false;">
      <input 
        type="tel" 
        id="phone" 
        placeholder="Enter 10-digit phone number" 
        maxlength="10" 
        pattern="[0-9]{10}"
        aria-label="Phone Number"
        required
      >
      <button type="button" onclick="sendOTP()" class="btn-primary">Send OTP</button>

      <div id="otpBox" style="display:none;" role="region" aria-live="polite">
        <input 
          type="text" 
          id="otp" 
          placeholder="Enter 4-digit OTP" 
          maxlength="4" 
          pattern="[0-9]{4}"
          aria-label="OTP Code"
        >
        <button type="button" onclick="verify()" class="btn-primary">Verify OTP</button>
      </div>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
