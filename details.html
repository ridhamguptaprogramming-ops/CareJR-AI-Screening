<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Details</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="details-page">
  <main class="container" aria-labelledby="detailsTitle">
    <div class="brand-chip">Patient Profile Setup</div>
    <h1 id="detailsTitle">Complete Your Profile</h1>
    <p class="subtext">This information is shown on dashboard and clinical reports.</p>

    <form id="detailsForm" novalidate>
      <label for="name">Full Name</label>
      <input
        type="text"
        id="name"
        placeholder="Full Name"
        aria-label="Full Name"
        pattern="^[a-zA-Z\s.'-]+$"
        title="Name should contain only letters, spaces, apostrophe, or hyphen"
        autocomplete="name"
        required
      >

      <label for="dob">Date of Birth</label>
      <input
        type="date"
        id="dob"
        aria-label="Date of Birth"
        required
      >

      <label for="state">State</label>
      <select id="state" aria-label="State" required>
        <option value="">Select State</option>
        <option value="Rajasthan">Rajasthan</option>
        <option value="Delhi">Delhi</option>
        <option value="Punjab">Punjab</option>
        <option value="Haryana">Haryana</option>
      </select>

      <label for="phone">Phone Number</label>
      <input
        type="tel"
        id="phone"
        placeholder="Phone Number"
        maxlength="10"
        pattern="[0-9]{10}"
        aria-label="Phone Number"
        readonly
      >
      <p class="helper-text">Phone number is auto-filled from login.</p>

      <button type="submit" class="btn-primary">Save & Continue</button>
      <a href="login.html" class="text-link">Back to Login</a>

      <p id="profileMessage" class="inline-message" aria-live="polite"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
