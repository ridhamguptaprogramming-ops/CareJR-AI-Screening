<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">
  <header class="nav">
    <button type="button" class="menu" aria-label="Toggle menu" onclick="toggle()">☰</button>
    <h1>Dashboard</h1>
    <button type="button" class="btn-ghost" onclick="logout()">Logout</button>
  </header>

  <aside class="sidebar" id="side" aria-label="Sidebar menu">
    <a href="dashboard.html" class="active">Overview</a>
    <a href="previous.html">Previous Data</a>
    <a href="newdata.html">New Data</a>
    <a href="newdata.html">Bills</a>
    <a href="newdata.html">Lab Reports</a>
    <a href="tel:108">Emergency Ambulance - 108</a>
  </aside>

  <main class="content">
    <section class="profile-card">
      <h2>Welcome, <span id="username">User</span></h2>
      <p><strong>DOB:</strong> <span id="dob">-</span></p>
      <p><strong>State:</strong> <span id="state">-</span></p>
      <p><strong>Phone:</strong> <span id="phone">-</span></p>
    </section>

    <section class="stats-grid" aria-label="Report statistics">
      <article class="stat-card">
        <h3>Total Reports</h3>
        <p id="statTotal">0</p>
      </article>
      <article class="stat-card">
        <h3>High Risk Reports</h3>
        <p id="statHighRisk">0</p>
      </article>
      <article class="stat-card">
        <h3>Most Recent Visit</h3>
        <p id="statLastVisit">-</p>
      </article>
    </section>

    <section class="quick-actions" aria-label="Quick actions">
      <a href="newdata.html" class="link-button btn-primary">Create New Report</a>
      <a href="previous.html" class="link-button btn-secondary">View Previous Reports</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
